<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>VoltVan — Business Roadmap & Action Plan</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚡</text></svg>">
  <script src="i18n.js"></script>
  <style>
    :root {
      --bg: #0a0a0a; --bg-card: #111113; --bg-card-hover: #18181b;
      --border: #222226; --border-light: #2a2a2e;
      --text: #e4e4e7; --text-muted: #71717a; --text-dim: #52525b;
      --accent: #c8ff00; --accent-dim: rgba(200,255,0,.12); --accent-glow: rgba(200,255,0,.25);
      --white: #fafafa;
      --ff-heading: 'Space Grotesk', system-ui, sans-serif;
      --ff-body: 'Inter', system-ui, sans-serif;
      --radius: 12px; --radius-sm: 8px;
      --ease: cubic-bezier(.4,0,.2,1);
      --success: #22c55e; --warn: #f59e0b;
    }
    [data-theme="light"] {
      --bg: #f4f4f5; --bg-card: #ffffff; --bg-card-hover: #f0f0f2;
      --border: #e4e4e7; --border-light: #d4d4d8;
      --text: #18181b; --text-muted: #52525b; --text-dim: #71717a;
      --accent: #65a300; --accent-dim: rgba(101,163,0,.1); --accent-glow: rgba(101,163,0,.2);
      --white: #09090b; --success: #16a34a;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; -webkit-font-smoothing: antialiased; }
    body { font-family: var(--ff-body); background: var(--bg); color: var(--text); line-height: 1.6; }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    .page { max-width: 900px; margin: 0 auto; padding: 2rem 1.5rem 6rem; }

    /* Header */
    .page-header { margin-bottom: 3rem; padding-bottom: 2rem; border-bottom: 1px solid var(--border); }
    .page-header h1 { font-family: var(--ff-heading); font-size: 2rem; font-weight: 700; color: var(--white); margin-bottom: .5rem; }
    .page-header h1 span { color: var(--accent); }
    .page-header p { color: var(--text-muted); font-size: .9375rem; }
    .back-link { display: inline-flex; align-items: center; gap: .375rem; font-size: .8125rem; color: var(--text-muted); transition: color .2s; }
    .back-link:hover { color: var(--accent); text-decoration: none; }

    /* Progress overview */
    .progress-bar-wrap { margin-top: 1.5rem; }
    .progress-stats { display: flex; justify-content: space-between; font-size: .75rem; color: var(--text-dim); margin-bottom: .5rem; }
    .progress-stats span:last-child { color: var(--accent); font-weight: 600; }
    .progress-track { height: 6px; background: var(--border); border-radius: 3px; overflow: hidden; }
    .progress-fill { height: 100%; background: var(--accent); border-radius: 3px; transition: width .4s var(--ease); }

    /* Sections */
    .section { margin-bottom: 2.5rem; }
    .section-title {
      font-family: var(--ff-heading); font-size: 1.25rem; font-weight: 700;
      color: var(--white); margin-bottom: .375rem; display: flex; align-items: center; gap: .75rem;
    }
    .section-title .badge {
      font-size: .625rem; font-weight: 600; text-transform: uppercase; letter-spacing: .06em;
      padding: .2rem .625rem; border-radius: 100px; background: var(--accent-dim); color: var(--accent);
    }
    .section-desc { color: var(--text-muted); font-size: .875rem; margin-bottom: 1.25rem; }

    /* Action items */
    .action { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius-sm); margin-bottom: .5rem; transition: border-color .2s; }
    .action:hover { border-color: var(--border-light); }
    .action.done { border-color: rgba(34,197,94,.2); }
    .action-top { display: flex; align-items: flex-start; gap: .75rem; padding: .875rem 1rem; cursor: pointer; }
    .action-check {
      flex-shrink: 0; width: 20px; height: 20px; margin-top: 2px;
      border: 2px solid var(--border-light); border-radius: 5px;
      display: flex; align-items: center; justify-content: center;
      transition: all .2s var(--ease); cursor: pointer;
    }
    .action.done .action-check { background: var(--success); border-color: var(--success); }
    .action-check svg { width: 12px; height: 12px; opacity: 0; transition: opacity .15s; }
    .action.done .action-check svg { opacity: 1; }
    .action-content { flex: 1; min-width: 0; }
    .action-label { font-size: .875rem; font-weight: 500; color: var(--text); transition: color .2s; cursor: pointer; }
    .action.done .action-label { color: var(--text-muted); text-decoration: line-through; text-decoration-color: var(--text-dim); }
    .action-meta { font-size: .75rem; color: var(--text-dim); margin-top: .125rem; cursor: pointer; border-radius: 4px; transition: color .2s; }
    .action-meta:hover { color: var(--text-muted); }
    .action-cost { font-family: var(--ff-heading); font-size: .75rem; font-weight: 600; color: var(--accent); white-space: nowrap; margin-left: auto; padding-left: 1rem; }
    .action.done .action-cost { opacity: .5; }

    /* Notes */
    .action-notes { padding: 0 1rem .875rem 2.75rem; display: none; }
    .action.has-notes .action-notes, .action.editing .action-notes { display: block; }
    .action-notes textarea {
      width: 100%; min-height: 56px; padding: .625rem .75rem;
      background: var(--bg); border: 1px solid var(--border); border-radius: 6px;
      color: var(--text); font-family: var(--ff-body); font-size: .8125rem; line-height: 1.5;
      resize: vertical; transition: border-color .2s;
    }
    .action-notes textarea:focus { outline: none; border-color: var(--accent); }
    .action-notes textarea::placeholder { color: var(--text-dim); }
    .note-toggle {
      flex-shrink: 0; background: none; border: none; color: var(--text-dim);
      cursor: pointer; padding: 4px; font-size: .75rem; transition: color .2s;
    }
    .note-toggle:hover { color: var(--text); }

    /* Info tables */
    .info-table { width: 100%; border-collapse: collapse; margin-bottom: 1.25rem; font-size: .8125rem; }
    .info-table th { text-align: left; font-weight: 600; color: var(--text-dim); font-size: .6875rem; text-transform: uppercase; letter-spacing: .06em; padding: .5rem .75rem; border-bottom: 1px solid var(--border); }
    .info-table td { padding: .625rem .75rem; border-bottom: 1px solid var(--border); color: var(--text-muted); }
    .info-table td:first-child { color: var(--text); font-weight: 500; }
    .info-table td:last-child { color: var(--accent); font-family: var(--ff-heading); font-weight: 600; text-align: right; }

    /* Callout */
    .callout { background: var(--accent-dim); border: 1px solid rgba(200,255,0,.15); border-radius: var(--radius-sm); padding: 1rem 1.25rem; margin-bottom: 1.5rem; }
    .callout-title { font-family: var(--ff-heading); font-size: .8125rem; font-weight: 600; color: var(--accent); margin-bottom: .25rem; text-transform: uppercase; letter-spacing: .04em; }
    .callout p { font-size: .8125rem; color: var(--text-muted); }

    /* Toolbar (lang + theme) */
    .toolbar{display:flex;align-items:center;gap:8px;margin-bottom:1.25rem}
    .lang-switcher{display:flex;gap:2px;padding:2px;border-radius:6px;background:rgba(255,255,255,.08)}
    .lang-btn{display:flex;align-items:center;gap:4px;padding:4px 10px;font-size:.6875rem;font-weight:600;font-family:var(--ff-heading);letter-spacing:.04em;border:none;border-radius:4px;background:transparent;color:var(--text-dim);cursor:pointer;transition:all .25s ease}
    .lang-btn.active{background:var(--accent);color:#0a0a0a}
    .lang-btn:hover:not(.active){color:var(--text)}
    .flag{width:14px;height:10px;border-radius:1.5px;flex-shrink:0}
    .theme-toggle{display:flex;align-items:center;justify-content:center;width:32px;height:32px;border:none;border-radius:6px;background:rgba(255,255,255,.08);color:var(--text-dim);cursor:pointer;transition:all .25s ease}
    .theme-toggle:hover{color:var(--text);background:rgba(255,255,255,.12)}
    .theme-icon{display:none}
    [data-theme="dark"] .theme-icon--dark,[data-theme="light"] .theme-icon--light,[data-theme="auto"] .theme-icon--auto{display:block}
    html:not([data-theme]) .theme-icon--dark{display:block}
    [data-theme="light"] .lang-switcher,[data-theme="light"] .theme-toggle{background:rgba(0,0,0,.06)}
    [data-theme="light"] .lang-btn:hover:not(.active){color:var(--text)}

    /* Responsive */
    @media (max-width: 600px) {
      .page { padding: 1.25rem 1rem 4rem; }
      .page-header h1 { font-size: 1.5rem; }
      .action-cost { display: none; }
    }
  </style>
</head>
<body>
  <div class="page">
    <div class="toolbar">
      <a href="index.html" class="back-link" id="backLink"><svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 19l-7-7 7-7"/></svg> <span id="rmBack">Back to site</span></a>
      <div style="flex:1"></div>
      <div class="lang-switcher" id="langSwitcher">
        <button class="lang-btn active" data-lang="en"><svg class="flag" viewBox="0 0 20 14"><rect width="20" height="14" fill="#012169"/><path d="M0 0l20 14M20 0L0 14" stroke="#fff" stroke-width="2.8"/><path d="M0 0l20 14M20 0L0 14" stroke="#C8102E" stroke-width="1.6"/><path d="M10 0v14M0 7h20" stroke="#fff" stroke-width="4.6"/><path d="M10 0v14M0 7h20" stroke="#C8102E" stroke-width="2.8"/></svg>EN</button>
        <button class="lang-btn" data-lang="uk"><svg class="flag" viewBox="0 0 20 14"><rect width="20" height="7" fill="#005BBB"/><rect y="7" width="20" height="7" fill="#FFD500"/></svg>UK</button>
        <button class="lang-btn" data-lang="es"><svg class="flag" viewBox="0 0 20 14"><rect width="20" height="3.5" fill="#AA151B"/><rect y="3.5" width="20" height="7" fill="#F1BF00"/><rect y="10.5" width="20" height="3.5" fill="#AA151B"/></svg>ES</button>
      </div>
      <button class="theme-toggle" id="themeToggle" aria-label="Toggle theme">
        <svg class="theme-icon theme-icon--light" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><path d="M12 1v2M12 21v2M4.22 4.22l1.42 1.42M18.36 18.36l1.42 1.42M1 12h2M21 12h2M4.22 19.78l1.42-1.42M18.36 5.64l1.42-1.42"/></svg>
        <svg class="theme-icon theme-icon--dark" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1111.21 3 7 7 0 0021 12.79z"/></svg>
        <svg class="theme-icon theme-icon--auto" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 2a10 10 0 000 20z" fill="currentColor" opacity=".3"/></svg>
      </button>
    </div>
    <div class="page-header">
      <h1>Vanworks EV Office <span id="rmTitle">Business Roadmap</span></h1>
      <p id="rmDesc">Everything you need to go from website to workshop. Check off items as you complete them, add notes to track progress.</p>
      <div class="progress-bar-wrap">
        <div class="progress-stats"><span id="progText">0 of 0 completed</span><span id="progPct">0%</span></div>
        <div class="progress-track"><div class="progress-fill" id="progFill" style="width:0"></div></div>
      </div>
    </div>

    <div id="roadmap"></div>
  </div>

  <script>
    const urlLang = new URLSearchParams(location.search).get('lang');
    let currentLang = (urlLang && ['en','uk','es'].includes(urlLang)) ? urlLang : (localStorage.getItem('vw_lang') || 'en');
    const t = (key) => (typeof I18N !== 'undefined' && I18N[currentLang] && I18N[currentLang][key]) ? I18N[currentLang][key] : (I18N?.en?.[key] || key);

    const SECTIONS = [
      { titleKey: 'rm_sec_f', descKey: 'rm_sec_f_desc', items: [
        { id: 'f1', labelKey: 'rm_f1', metaKey: 'rm_f1_m', cost: '£1,500-3,000/mo' },
        { id: 'f2', labelKey: 'rm_f2', metaKey: 'rm_f2_m', cost: '£3,000-8,000' },
        { id: 'f3', labelKey: 'rm_f3', metaKey: 'rm_f3_m' },
        { id: 'f4', labelKey: 'rm_f4', metaKey: 'rm_f4_m' },
        { id: 'f5', labelKey: 'rm_f5', metaKey: 'rm_f5_m', cost: '£3,000-6,000' },
      ]},
      { titleKey: 'rm_sec_eq', descKey: 'rm_sec_eq_desc', items: [
        { id: 'eq1', labelKey: 'rm_eq1', cost: '£8,000-15,000' },
        { id: 'eq2', labelKey: 'rm_eq2', metaKey: 'rm_eq2_m', cost: '£5,000-10,000' },
        { id: 'eq3', labelKey: 'rm_eq3', cost: '£2,000-5,000' },
        { id: 'eq4', labelKey: 'rm_eq4', cost: '£3,000-5,000' },
        { id: 'eq5', labelKey: 'rm_eq5', metaKey: 'rm_eq5_m', cost: '£500-2,000' },
      ]},
      { titleKey: 'rm_sec_t', descKey: 'rm_sec_t_desc', items: [
        { id: 't1', labelKey: 'rm_t1', metaKey: 'rm_t1_m' }, { id: 't2', labelKey: 'rm_t2', metaKey: 'rm_t2_m' },
        { id: 't3', labelKey: 'rm_t3', metaKey: 'rm_t3_m' }, { id: 't4', labelKey: 'rm_t4', metaKey: 'rm_t4_m' },
        { id: 't5', labelKey: 'rm_t5', metaKey: 'rm_t5_m' },
      ]},
      { titleKey: 'rm_sec_c', descKey: 'rm_sec_c_desc', badgeKey: 'rm_badge_critical', items: [
        { id: 'c1', labelKey: 'rm_c1', metaKey: 'rm_c1_m' }, { id: 'c2', labelKey: 'rm_c2', metaKey: 'rm_c2_m' },
        { id: 'c3', labelKey: 'rm_c3', metaKey: 'rm_c3_m' }, { id: 'c4', labelKey: 'rm_c4', metaKey: 'rm_c4_m', cost: '£500-1,500/yr' },
        { id: 'c5', labelKey: 'rm_c5', metaKey: 'rm_c5_m', cost: '£1,000-3,000/yr' }, { id: 'c6', labelKey: 'rm_c6', metaKey: 'rm_c6_m', cost: '£400-1,000/yr' },
        { id: 'c7', labelKey: 'rm_c7', metaKey: 'rm_c7_m', cost: '£1,500-3,000/yr' }, { id: 'c8', labelKey: 'rm_c8', metaKey: 'rm_c8_m' },
      ]},
      { titleKey: 'rm_sec_s', descKey: 'rm_sec_s_desc', items: [
        { id: 's1', labelKey: 'rm_s1', metaKey: 'rm_s1_m' }, { id: 's2', labelKey: 'rm_s2', metaKey: 'rm_s2_m' },
        { id: 's3', labelKey: 'rm_s3', metaKey: 'rm_s3_m' }, { id: 's4', labelKey: 'rm_s4', metaKey: 'rm_s4_m' },
        { id: 's5', labelKey: 'rm_s5', metaKey: 'rm_s5_m' }, { id: 's6', labelKey: 'rm_s6', metaKey: 'rm_s6_m' },
        { id: 's7', labelKey: 'rm_s7', metaKey: 'rm_s7_m' },
      ]},
      { titleKey: 'rm_sec_b', descKey: 'rm_sec_b_desc', badgeKey: 'rm_badge_start', items: [
        { id: 'b1', labelKey: 'rm_b1', metaKey: 'rm_b1_m', cost: '£12,000-18,000' }, { id: 'b2', labelKey: 'rm_b2', metaKey: 'rm_b2_m' },
        { id: 'b3', labelKey: 'rm_b3', metaKey: 'rm_b3_m' }, { id: 'b4', labelKey: 'rm_b4', metaKey: 'rm_b4_m', cost: '£8,000-16,000' },
        { id: 'b5', labelKey: 'rm_b5', metaKey: 'rm_b5_m', cost: '£5,000-7,000' }, { id: 'b6', labelKey: 'rm_b6', metaKey: 'rm_b6_m', cost: '£25,000-40,000' },
        { id: 'b7', labelKey: 'rm_b7', metaKey: 'rm_b7_m', cost: '£1,000-2,000' }, { id: 'b8', labelKey: 'rm_b8', metaKey: 'rm_b8_m' },
        { id: 'b9', labelKey: 'rm_b9', metaKey: 'rm_b9_m' },
      ]},
      { titleKey: 'rm_sec_bz', descKey: 'rm_sec_bz_desc', items: [
        { id: 'bz1', labelKey: 'rm_bz1', metaKey: 'rm_bz1_m', cost: '£12-50' }, { id: 'bz2', labelKey: 'rm_bz2', metaKey: 'rm_bz2_m' },
        { id: 'bz3', labelKey: 'rm_bz3', metaKey: 'rm_bz3_m' }, { id: 'bz4', labelKey: 'rm_bz4', metaKey: 'rm_bz4_m' },
        { id: 'bz5', labelKey: 'rm_bz5', metaKey: 'rm_bz5_m' }, { id: 'bz6', labelKey: 'rm_bz6', metaKey: 'rm_bz6_m' },
      ]},
      { titleKey: 'rm_sec_mk', descKey: 'rm_sec_mk_desc', items: [
        { id: 'mk1', labelKey: 'rm_mk1', metaKey: 'rm_mk1_m' }, { id: 'mk2', labelKey: 'rm_mk2', metaKey: 'rm_mk2_m' },
        { id: 'mk3', labelKey: 'rm_mk3', metaKey: 'rm_mk3_m' }, { id: 'mk4', labelKey: 'rm_mk4', metaKey: 'rm_mk4_m' },
        { id: 'mk5', labelKey: 'rm_mk5', metaKey: 'rm_mk5_m' }, { id: 'mk6', labelKey: 'rm_mk6', metaKey: 'rm_mk6_m' },
        { id: 'mk7', labelKey: 'rm_mk7', metaKey: 'rm_mk7_m' },
      ]},
      { titleKey: 'rm_sec_fin', descKey: 'rm_sec_fin_desc', items: [
        { id: 'fin1', labelKey: 'rm_fin1', metaKey: 'rm_fin1_m' }, { id: 'fin2', labelKey: 'rm_fin2', metaKey: 'rm_fin2_m' },
        { id: 'fin3', labelKey: 'rm_fin3', metaKey: 'rm_fin3_m' }, { id: 'fin4', labelKey: 'rm_fin4', metaKey: 'rm_fin4_m' },
        { id: 'fin5', labelKey: 'rm_fin5', metaKey: 'rm_fin5_m' },
      ]},
      { titleKey: 'rm_sec_g', descKey: 'rm_sec_g_desc', items: [
        { id: 'g1', labelKey: 'rm_g1', metaKey: 'rm_g1_m' }, { id: 'g2', labelKey: 'rm_g2', metaKey: 'rm_g2_m' },
        { id: 'g3', labelKey: 'rm_g3', metaKey: 'rm_g3_m' }, { id: 'g4', labelKey: 'rm_g4', metaKey: 'rm_g4_m' },
        { id: 'g5', labelKey: 'rm_g5', metaKey: 'rm_g5_m' }, { id: 'g6', labelKey: 'rm_g6', metaKey: 'rm_g6_m' },
      ]},
    ];

    const LS_KEY = 'vw_roadmap';

    const load = () => {
      try { return JSON.parse(localStorage.getItem(LS_KEY)) || {}; }
      catch { return {}; }
    };
    const save = (data) => localStorage.setItem(LS_KEY, JSON.stringify(data));

    let data = load();

    const container = document.getElementById('roadmap');

    const allIds = [];
    SECTIONS.forEach(sec => sec.items.forEach(it => allIds.push(it.id)));

    const render = () => {
      container.innerHTML = SECTIONS.map(sec => {
        const badge = sec.badgeKey ? `<span class="badge">${t(sec.badgeKey)}</span>` : '';
        const items = sec.items.map(it => {
          const d = data[it.id] || {};
          const done = d.done ? ' done' : '';
          const hasNotes = d.notes ? ' has-notes' : '';
          const meta = it.metaKey ? t(it.metaKey) : '';
          return `<div class="action${done}${hasNotes}" data-id="${it.id}">
            <div class="action-top">
              <div class="action-check" data-action="toggle"><svg viewBox="0 0 12 12" fill="none" stroke="#0a0a0a" stroke-width="2"><path d="M2 6l3 3 5-5"/></svg></div>
              <div class="action-content">
                <div class="action-label" data-action="toggle">${t(it.labelKey)}</div>
                ${meta ? `<div class="action-meta" data-action="note">${meta}</div>` : ''}
              </div>
              ${it.cost ? `<span class="action-cost">${it.cost}</span>` : ''}
              <button class="note-toggle" data-action="note" title="${t('rm_add_note')}">&#9998;</button>
            </div>
            <div class="action-notes">
              <textarea placeholder="${t('rm_note_placeholder')}" data-action="textarea">${(d.notes || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}</textarea>
            </div>
          </div>`;
        }).join('');
        return `<div class="section">
          <h2 class="section-title">${t(sec.titleKey)} ${badge}</h2>
          <p class="section-desc">${t(sec.descKey)}</p>
          ${items}
        </div>`;
      }).join('');
      updateProgress();
    };

    const updateProgress = () => {
      const total = allIds.length;
      const done = allIds.filter(id => data[id]?.done).length;
      const pct = total ? Math.round((done / total) * 100) : 0;
      const progEl = document.getElementById('progText');
      if (progEl) progEl.textContent = `${done} ${t('rm_of')} ${total} ${t('rm_completed')}`;
      document.getElementById('progPct').textContent = `${pct}%`;
      document.getElementById('progFill').style.width = `${pct}%`;
    };

    const updateStaticUI = () => {
      const back = document.getElementById('rmBack');
      if (back) back.textContent = t('rm_back');
      const title = document.getElementById('rmTitle');
      if (title) title.textContent = t('rm_title');
      const desc = document.getElementById('rmDesc');
      if (desc) desc.textContent = t('rm_desc');
      document.title = 'VoltVan — ' + t('rm_title');
    };

    container.addEventListener('click', (e) => {
      const action = e.target.closest('[data-action]');
      if (!action) return;
      const card = action.closest('.action');
      const id = card.dataset.id;
      if (!data[id]) data[id] = {};

      if (action.dataset.action === 'toggle') {
        data[id].done = !data[id].done;
        card.classList.toggle('done', data[id].done);
        save(data);
        updateProgress();
      }

      if (action.dataset.action === 'note') {
        card.classList.toggle('editing');
        const ta = card.querySelector('textarea');
        if (card.classList.contains('editing')) ta.focus();
      }
    });

    let saveTimer;
    container.addEventListener('input', (e) => {
      if (e.target.dataset.action !== 'textarea') return;
      const card = e.target.closest('.action');
      const id = card.dataset.id;
      if (!data[id]) data[id] = {};
      data[id].notes = e.target.value;
      card.classList.toggle('has-notes', !!e.target.value);
      clearTimeout(saveTimer);
      saveTimer = setTimeout(() => save(data), 300);
    });

    render();

    /* ---- Shared language switcher ---- */
    const setLangURL = (lang) => {
      const u = new URL(location);
      if (lang === 'en') u.searchParams.delete('lang');
      else u.searchParams.set('lang', lang);
      history.replaceState(null, '', u);
    };

    const activateLang = (lang) => {
      currentLang = lang;
      localStorage.setItem('vw_lang', lang);
      setLangURL(lang);
      document.documentElement.lang = lang === 'uk' ? 'uk' : (lang === 'es' ? 'es' : 'en');
      document.querySelectorAll('.lang-btn').forEach(b => b.classList.toggle('active', b.dataset.lang === lang));
      const back = document.getElementById('backLink');
      if (back) back.href = lang === 'en' ? 'index.html' : `index.html?lang=${lang}`;
      render();
      updateStaticUI();
    };

    activateLang(currentLang);

    document.getElementById('langSwitcher').addEventListener('click', (e) => {
      const btn = e.target.closest('.lang-btn');
      if (btn && btn.dataset.lang) activateLang(btn.dataset.lang);
    });

    /* ---- Shared theme switcher ---- */
    const THEMES = ['dark', 'light', 'auto'];
    const applyTheme = (theme) => {
      localStorage.setItem('vw_theme', theme);
      if (theme === 'auto') {
        const prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
        document.documentElement.setAttribute('data-theme', prefersDark ? 'auto' : 'light');
        document.documentElement.style.colorScheme = prefersDark ? 'dark' : 'light';
      } else {
        document.documentElement.setAttribute('data-theme', theme);
        document.documentElement.style.colorScheme = theme;
      }
    };

    const themeBtn = document.getElementById('themeToggle');
    let themeIdx = THEMES.indexOf(localStorage.getItem('vw_theme') || 'dark');
    if (themeIdx < 0) themeIdx = 0;
    applyTheme(THEMES[themeIdx]);

    themeBtn.addEventListener('click', () => {
      themeIdx = (themeIdx + 1) % THEMES.length;
      applyTheme(THEMES[themeIdx]);
    });

    window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', () => {
      if (THEMES[themeIdx] === 'auto') applyTheme('auto');
    });
  </script>
</body>
</html>
